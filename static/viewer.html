    <script>
        /* === 테마 모드 관리 === */
        function initTheme() {
            const savedTheme = localStorage.getItem("theme");
            if (savedTheme) {
                document.documentElement.setAttribute("data-theme", savedTheme);
            } else {
                /* OS 설정 기반으로 data-theme 명시적 설정 (CSS는 data-theme만 참조) */
                const preferLight = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
                document.documentElement.setAttribute("data-theme", preferLight ? "light" : "dark");
            }
            updateThemeUI();
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute("data-theme");
            let newTheme = "dark";
            
            if (currentTheme === "light") {
                newTheme = "dark";
            } else if (currentTheme === "dark") {
                newTheme = "light";
            } else {
                if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) {
                    newTheme = "dark";
                } else {
                    newTheme = "light";
                }
            }

            document.documentElement.setAttribute("data-theme", newTheme);
            localStorage.setItem("theme", newTheme);
            updateThemeUI();
        }

        function updateThemeUI() {
            const currentTheme = document.documentElement.getAttribute("data-theme");
            const btn = document.getElementById("theme-toggle-btn");
            if (!btn) return;
            const isLight = currentTheme === "light" || (!currentTheme && window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches);

            if (isLight) {
                btn.innerHTML = `<span id="theme-icon" aria-hidden="true">☀️</span> 라이트 모드`;
                btn.setAttribute("aria-label", "현재 라이트 모드, 다크 모드로 전환");
            } else {
                btn.innerHTML = `<span id="theme-icon" aria-hidden="true">🌙</span> 다크 모드`;
                btn.setAttribute("aria-label", "현재 다크 모드, 라이트 모드로 전환");
            }
        }
        initTheme();

        /* === PDF 다운로드 === */
        function downloadSessionPdf() {
            const sessionId = AppState.currentSessionId;
            if (!sessionId) return;
            window.open(`/api/sessions/${sessionId}/export?format=pdf`, "_blank");
        }

        /* === 스크린 리더 집약 알림 (5초 간격) === */
        let _srPendingCount = 0;
        let _srTimer = null;
        function notifySrLive(count) {
            _srPendingCount += count;
            if (_srTimer) return;
            _srTimer = setTimeout(() => {
                const region = document.getElementById("sr-live-region");
                if (region && _srPendingCount > 0) {
                    region.textContent = `새 자막 ${_srPendingCount}건 추가됨`;
                }
                _srPendingCount = 0;
                _srTimer = null;
            }, 5000);
        }

        /* === 세션 날짜 파싱 유틸 === */
        function parseSessionDate(session) {
            if (session.date && session.time) {
                const timeStr = session.time.replace(/(\d{2})(\d{2})(\d{2})/, "$1:$2:$3");
                return new Date(session.date + "T" + timeStr);
            }
            return new Date(session.started_at || session.created_at || Date.now());
        }

        const transcriptEl = document.getElementById("transcript");
        const connectionEl = document.getElementById("connection-status");
        const autoScrollEl = document.getElementById("auto-scroll");
        const elapsedEl = document.getElementById("elapsed");
        const segmentsEl = document.getElementById("segments");
        const sessionStatusEl = document.getElementById("session-status");
        const pauseBtn = document.getElementById("btn-pause");
        const deviceSelectEl = document.getElementById("device-select");
        const deviceStatusEl = document.getElementById("device-status");
        const keywordInputEl = document.getElementById("keyword-input");
        const keywordListEl = document.getElementById("keyword-list");
        const emptyState = document.getElementById("empty-state");
        const sidebarEl = document.getElementById("sidebar");
        const sessionListEl = document.getElementById("session-list");
        const sessionEmptyEl = document.getElementById("session-empty");
        const returnLiveBtn = document.getElementById("return-live-btn");
        const historyBanner = document.getElementById("history-banner");
        const historyBannerText = document.getElementById("history-banner-text");
        const newSessionBtn = document.getElementById("new-session-btn");
        const sidebarBackdrop = document.getElementById("sidebar-backdrop");
        const sessionSearchResultsEl = document.getElementById("session-search-results");
        const focusableSelector = 'button:not([disabled]), [href], input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])';
        let activeModal = null;

        function updateSessionSearchResults(count) {
            if (!sessionSearchResultsEl) return;

            const query = document.getElementById("session-search-input")?.value.trim() || "";
            const dateFrom = document.getElementById("session-date-from")?.value || "";
            const dateTo = document.getElementById("session-date-to")?.value || "";
            const isFiltered = Boolean(query || dateFrom || dateTo);

            sessionSearchResultsEl.textContent = isFiltered ? `${count}건 일치` : `총 ${count}개 세션`;
        }

        /* === 앱 상태 관리 === */
        const AppState = {
            currentView: "live",        // "live" | "history"
            currentSessionId: null,     // 현재 보고 있는 과거 세션 ID
            sessions: [],               // 전체 세션 목록
            isRecording: false,         // 실시간 녹음 중 여부
            sidebarOpen: window.innerWidth > 768,  // 모바일에서는 기본 접힘
        };

        /* === 사이드바 토글 === */
        function toggleSidebar() {
            AppState.sidebarOpen = !AppState.sidebarOpen;
            sidebarEl.classList.toggle("collapsed", !AppState.sidebarOpen);

            // 모바일 백드롭 제어
            if (window.innerWidth <= 768) {
                sidebarBackdrop.classList.toggle("visible", AppState.sidebarOpen);
            }
        }

        // 초기 사이드바 상태 설정
        if (window.innerWidth <= 768) {
            sidebarEl.classList.add("collapsed");
            AppState.sidebarOpen = false;
        }

        // 리사이즈 대응
        window.addEventListener("resize", () => {
            if (window.innerWidth > 768) {
                sidebarEl.classList.remove("collapsed");
                sidebarBackdrop.classList.remove("visible");
                AppState.sidebarOpen = true;
            }
        });

        /* === 세션 목록 로드 === */
        async function loadSessionList() {
            try {
                // 검색/필터 파라미터 수집
                const params = new URLSearchParams();
                const searchInput = document.getElementById("session-search-input");
                const dateFrom = document.getElementById("session-date-from");
                const dateTo = document.getElementById("session-date-to");

                if (searchInput && searchInput.value.trim()) {
                    params.set("q", searchInput.value.trim());
                }
                if (dateFrom && dateFrom.value) {
                    params.set("from", dateFrom.value);
                }
                if (dateTo && dateTo.value) {
                    params.set("to", dateTo.value);
                }

                const queryStr = params.toString();
                const url = "/api/sessions" + (queryStr ? "?" + queryStr : "");
                const res = await fetch(url, { cache: "no-store" });
                if (!res.ok) {
                    // API 미구현 시 빈 상태 유지
                    if (res.status === 404) return;
                    throw new Error("세션 목록 로드 실패");
                }
                const sessions = await res.json();
                AppState.sessions = Array.isArray(sessions) ? sessions : [];
                renderSessionList(AppState.sessions);
            } catch (e) {
                // API 미구현이거나 서버 미연결 시 조용히 무시
                console.debug("[사이드바] 세션 목록 로드 실패:", e.message);
            }
        }

        /* === 세션 목록 렌더링 (날짜별 그룹화) === */
        function renderSessionList(sessions) {
            // 빈 상태 제거
            if (sessionEmptyEl) sessionEmptyEl.remove();

            // 기존 목록 비우기 (빈 상태 요소 제외)
            sessionListEl.innerHTML = "";
            updateSessionSearchResults(Array.isArray(sessions) ? sessions.length : 0);

            if (!sessions || sessions.length === 0) {
                const emptyDiv = document.createElement("div");
                emptyDiv.className = "session-empty";
                emptyDiv.id = "session-empty";
                const seIcon = document.createElement("span");
                seIcon.className = "icon";
                seIcon.setAttribute("aria-hidden", "true");
                seIcon.textContent = "\u25CE";
                emptyDiv.appendChild(seIcon);
                emptyDiv.appendChild(document.createTextNode("\uC138\uC158 \uAE30\uB85D\uC774 \uC5C6\uC2B5\uB2C8\uB2E4"));
                sessionListEl.appendChild(emptyDiv);
                return;
            }

            // 날짜별 그룹화
            const groups = groupSessionsByDate(sessions);

            for (const [label, items] of groups) {
                // 그룹 헤더
                const header = document.createElement("div");
                header.className = "session-group-header";
                header.textContent = label;
                sessionListEl.appendChild(header);

                // 세션 항목
                for (const session of items) {
                    const item = createSessionItem(session);
                    sessionListEl.appendChild(item);
                }
            }
        }

        /* === 날짜별 그룹화 유틸 === */
        function groupSessionsByDate(sessions) {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);

            const groups = new Map();

            for (const session of sessions) {
                const date = parseSessionDate(session);
                const dateOnly = new Date(date.getFullYear(), date.getMonth(), date.getDate());
                let label;

                if (dateOnly.getTime() === today.getTime()) {
                    label = "\uC624\uB298";  // 오늘
                } else if (dateOnly.getTime() === yesterday.getTime()) {
                    label = "\uC5B4\uC81C";  // 어제
                } else {
                    label = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
                }

                if (!groups.has(label)) {
                    groups.set(label, []);
                }
                groups.get(label).push(session);
            }

            return groups;
        }

        /* === 세션 항목 DOM 생성 === */
        function createSessionItem(session) {
            const item = document.createElement("div");
            item.className = "session-item";
            item.setAttribute("tabindex", "0");
            item.setAttribute("role", "button");
            item.dataset.sessionId = session.id;
            const isLive = session.is_live || false;
            const isActive = (AppState.currentView === "live" && isLive) ||
                             (AppState.currentView === "history" && AppState.currentSessionId === session.id);

            if (isActive) item.classList.add("active");

            // 시작 시간 포맷
            const date = parseSessionDate(session);
            const timeStr = `${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;

            // 메타 정보
            const segCount = session.segment_count || 0;
            const speakerCount = session.speaker_count || 0;

            if (isLive) {
                const dot = document.createElement("span");
                dot.className = "session-live-dot";
                const info = document.createElement("div");
                info.className = "session-item-info";
                const title = document.createElement("div");
                title.className = "session-item-title";
                title.textContent = timeStr + " ";
                const liveLabel = document.createElement("span");
                liveLabel.className = "session-live-label";
                liveLabel.textContent = "\uC2E4\uC2DC\uAC04";
                title.appendChild(liveLabel);
                const meta = document.createElement("div");
                meta.className = "session-item-meta";
                const segSpan = document.createElement("span");
                segSpan.textContent = segCount + "\uAC1C \uC138\uADF8\uBA3C\uD2B8";
                meta.appendChild(segSpan);
                if (speakerCount > 0) {
                    const spkSpan = document.createElement("span");
                    spkSpan.textContent = "\u00B7 " + speakerCount + "\uBA85";
                    meta.appendChild(spkSpan);
                }
                const progress = document.createElement("div");
                progress.className = "session-progress";
                progress.id = "session-progress";
                const progressBar = document.createElement("div");
                progressBar.className = "session-progress-bar";
                const progressFill = document.createElement("div");
                progressFill.className = "session-progress-fill";
                progressBar.appendChild(progressFill);
                const progressLabel = document.createElement("div");
                progressLabel.className = "session-progress-label";
                progress.append(progressBar, progressLabel);
                info.append(title, meta, progress);
                item.append(dot, info);
            } else {
                const hInfo = document.createElement("div");
                hInfo.className = "session-item-info";
                const hTitle = document.createElement("div");
                hTitle.className = "session-item-title";
                hTitle.textContent = timeStr;
                const hMeta = document.createElement("div");
                hMeta.className = "session-item-meta";
                const hSeg = document.createElement("span");
                hSeg.textContent = segCount + "개 세그먼트";
                hMeta.appendChild(hSeg);
                if (speakerCount > 0) {
                    const hSpk = document.createElement("span");
                    hSpk.textContent = "· " + speakerCount + "명";
                    hMeta.appendChild(hSpk);
                }
                hInfo.append(hTitle, hMeta);
                const delBtn = document.createElement("button");
                delBtn.className = "session-delete-btn";
                delBtn.dataset.deleteId = session.id;
                delBtn.title = "세션 삭제";
                delBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4h12M5.33 4V2.67a1.33 1.33 0 011.34-1.34h2.66a1.33 1.33 0 011.34 1.34V4M6.67 7.33v4M9.33 7.33v4M3.33 4l.67 9.33a1.33 1.33 0 001.33 1.34h5.34a1.33 1.33 0 001.33-1.34L12.67 4"/></svg>';
                item.append(hInfo, delBtn);
            }

            // 클릭 이벤트 (삭제 버튼 제외)
            function activateItem(e) {
                if (e.target.closest(".session-delete-btn")) return;
                if (isLive) {
                    returnToLiveSession();
                } else {
                    loadSession(session.id);
                }
            }
            item.addEventListener("click", activateItem);
            item.addEventListener("keydown", (e) => {
                if (e.target.closest(".session-delete-btn")) return;
                if (e.key === "Enter" || e.key === " " || e.key === "Spacebar") {
                    e.preventDefault();
                    activateItem(e);
                }
            });

            // 삭제 버튼 이벤트
            const deleteBtn = item.querySelector(".session-delete-btn");
            if (deleteBtn) {
                deleteBtn.setAttribute("aria-label", `${timeStr} 세션 삭제`);
                deleteBtn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    showDeleteModal(session.id);
                });
            }

            return item;
        }

        /* === 과거 세션 로드 === */
        async function loadSession(sessionId) {
            try {
                const res = await fetch(`/api/sessions/${sessionId}`, { cache: "no-store" });
                if (!res.ok) throw new Error("세션 로드 실패");
                const data = await res.json();
                renderPastSession(sessionId, data);
            } catch (e) {
                console.error("[사이드바] 세션 로드 실패:", e.message);
            }
        }

        /* === 과거 세션 전사 내용 렌더링 === */
        function renderPastSession(sessionId, data) {
            // 상태 업데이트
            AppState.currentView = "history";
            AppState.currentSessionId = sessionId;

            // SSE 연결 일시 중단
            if (source) {
                source.close();
                source = null;
            }

            // 가상 스크롤 리셋
            VirtualScroll.reset();

            // 메인 전사 영역 비우기
            transcriptEl.innerHTML = "";

            // 과거 세그먼트 렌더링
            const segments = data.segments || data.history || data || [];
            if (Array.isArray(segments) && segments.length > 0) {
                // globalSegmentIndex를 리셋하지 않음 (충돌 방지)
                for (const seg of segments) {
                    appendTranscript(seg);
                }
                // 상단으로 스크롤
                transcriptEl.scrollTop = 0;
            } else {
                const emptyDiv = document.createElement("div");
                emptyDiv.className = "empty-state";
                const emptyIcon = document.createElement("span");
                emptyIcon.className = "icon";
                emptyIcon.textContent = "\u25C9";
                const emptyText = document.createElement("span");
                emptyText.textContent = "\uC804\uC0AC \uB0B4\uC5ED\uC774 \uC5C6\uC2B5\uB2C8\uB2E4";
                emptyDiv.append(emptyIcon, emptyText);
                transcriptEl.appendChild(emptyDiv);
            }

            // 배너 표시
            const date = parseSessionDate(data);
            const timeStr = `${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
            historyBannerText.textContent = `\uACFC\uAC70 \uC138\uC158 (${timeStr})\uC744 \uBCF4\uACE0 \uC788\uC2B5\uB2C8\uB2E4`;
            historyBanner.classList.add("visible");

            // PDF 버튼 표시
            const pdfBtn = document.getElementById("history-pdf-btn");
            if (pdfBtn) pdfBtn.style.display = "";

            // 실시간 복귀 버튼 표시
            returnLiveBtn.classList.add("visible");

            // 사이드바 활성 항목 갱신
            updateSidebarActive();

            // 컨트롤 비활성화 (과거 세션에서는 녹음 관련 버튼 숨김)
            pauseBtn.style.display = "none";
            document.getElementById("btn-shutdown").style.display = "none";
            document.getElementById("btn-pip").style.display = "none";

            // 모바일에서 사이드바 닫기
            if (window.innerWidth <= 768) {
                toggleSidebar();
            }
        }

        /* === 실시간 세션으로 복귀 === */
        function returnToLiveSession() {
            AppState.currentView = "live";
            AppState.currentSessionId = null;

            // 배너 + PDF 버튼 숨기기
            historyBanner.classList.remove("visible");
            const pdfBtn = document.getElementById("history-pdf-btn");
            if (pdfBtn) pdfBtn.style.display = "none";

            // 실시간 복귀 버튼 숨기기
            returnLiveBtn.classList.remove("visible");

            // 컨트롤 복원
            pauseBtn.style.display = "";
            document.getElementById("btn-shutdown").style.display = "";
            document.getElementById("btn-pip").style.display = "";

            // 가상 스크롤 리셋
            VirtualScroll.reset();

            // 메인 전사 영역 비우기 + 빈 상태 복원
            transcriptEl.innerHTML = '<div class="empty-state" id="empty-state"><span class="icon">\u25C9</span><span>\uB9C8\uC774\uD06C \uC785\uB825 \uB300\uAE30 \uC911...</span></div>';

            // 히스토리 재로드 + SSE 재연결
            globalSegmentIndex = 0;
            loadHistory().finally(() => {
                connectStream();
            });

            // 사이드바 활성 항목 갱신
            updateSidebarActive();

            // 모바일에서 사이드바 닫기
            if (window.innerWidth <= 768 && AppState.sidebarOpen) {
                toggleSidebar();
            }
        }

        /* === 새 세션 시작 === */
        async function startNewSession() {
            if (!AppState.isRecording) return;

            try {
                const res = await fetch("/api/sessions/new", { method: "POST" });
                if (!res.ok) throw new Error("새 세션 시작 실패");

                // 가상 스크롤 리셋 + 메인 영역 리셋
                VirtualScroll.reset();
                transcriptEl.innerHTML = '<div class="empty-state" id="empty-state"><span class="icon">\u25C9</span><span>\uC0C8 \uC138\uC158 \uC2DC\uC791 \uB300\uAE30 \uC911...</span></div>';
                globalSegmentIndex = 0;

                // 실시간 뷰로 전환
                AppState.currentView = "live";
                AppState.currentSessionId = null;
                historyBanner.classList.remove("visible");
                returnLiveBtn.classList.remove("visible");

                // 세션 목록 갱신
                await loadSessionList();

                // SSE 재연결
                connectStream();
            } catch (e) {
                console.error("[사이드바] 새 세션 시작 실패:", e.message);
            }
        }

        /* === 사이드바 활성 항목 갱신 === */
        function updateSidebarActive() {
            const items = sessionListEl.querySelectorAll(".session-item");
            for (const item of items) {
                const id = item.dataset.sessionId;
                const isLiveItem = item.querySelector(".session-live-dot") !== null;
                const isActive = (AppState.currentView === "live" && isLiveItem) ||
                                 (AppState.currentView === "history" && id === AppState.currentSessionId);
                item.classList.toggle("active", isActive);
            }
        }

        /* === 사이드바 후처리 진행 갱신 === */
        function updateSessionProgress(postprocess) {
            const el = document.getElementById("session-progress");
            if (!el) return;

            if (!postprocess || postprocess.phase === "done") {
                el.classList.remove("active");
                return;
            }

            el.classList.add("active");
            const fill = el.querySelector(".session-progress-fill");
            const label = el.querySelector(".session-progress-label");
            const pct = postprocess.progress || 0;

            fill.style.width = pct + "%";

            const phaseLabels = {
                stt_correct: "STT 교정",
                summarize: "요약 생성",
                saving: "저장 중",
            };
            const phaseText = phaseLabels[postprocess.phase] || postprocess.phase;
            label.textContent = `${phaseText} ${Math.round(pct)}%`;
        }

        /* === 녹음 상태에 따라 새 세션 버튼 활성화 === */
        function updateNewSessionBtn(isRecording) {
            AppState.isRecording = isRecording;
            newSessionBtn.disabled = !isRecording;
            if (isRecording) {
                newSessionBtn.title = "\uD604\uC7AC \uC138\uC158\uC744 \uC800\uC7A5\uD558\uACE0 \uC0C8 \uC138\uC158\uC744 \uC2DC\uC791\uD569\uB2C8\uB2E4";
            } else {
                newSessionBtn.title = "\uB179\uC74C \uC911\uC5D0\uB9CC \uC0C8 \uC138\uC158\uC744 \uC2DC\uC791\uD560 \uC218 \uC788\uC2B5\uB2C8\uB2E4";
            }
        }

        let autoScroll = true;
        let source = null;
        let isPaused = false;
        let deviceRefreshInFlight = null;
        let lastDeviceRefreshAt = 0;
        const transcriptMergeGapSeconds = 5;
        const transcriptMergeMaxSegments = 4;
        const transcriptMergeMaxChars = 280;

        let pipWindow = null;

        async function togglePip() {
            // Document PIP API 지원 여부 확인
            if (!("documentPictureInPicture" in window)) {
                alert("현재 사용 중인 브라우저는 미니 모드(Document PIP)를 지원하지 않습니다. Chrome 최신 버전을 사용해 주세요.");
                return;
            }

            const btnPip = document.getElementById("btn-pip");
            const transcriptContainer = document.getElementById("transcript");
            
            // 이미 PIP가 켜져 있으면 닫기
            if (pipWindow) {
                pipWindow.close();
                return;
            }

            try {
                // PIP 창 열기 (가로 360, 세로 450 정도로 더 콤팩트하게)
                pipWindow = await window.documentPictureInPicture.requestWindow({
                    width: 360,
                    height: 450,
                });

                btnPip.classList.add("active");
                btnPip.innerHTML = '<span aria-hidden="true">🪟</span> 원래대로';
                btnPip.style.color = "var(--accent)";

                // PIP 창 제목 설정
                pipWindow.document.title = "실시간 자막";

                // 모든 스타일시트를 완벽하게 복사
                [...document.styleSheets].forEach((styleSheet) => {
                    try {
                        if (styleSheet.cssRules) {
                            const newStyle = pipWindow.document.createElement("style");
                            [...styleSheet.cssRules].forEach((rule) => {
                                newStyle.appendChild(pipWindow.document.createTextNode(rule.cssText));
                            });
                            pipWindow.document.head.appendChild(newStyle);
                        }
                    } catch (e) {
                        if (styleSheet.href) {
                            const link = pipWindow.document.createElement("link");
                            link.rel = "stylesheet";
                            link.href = styleSheet.href;
                            pipWindow.document.head.appendChild(link);
                        }
                    }
                });

                // PIP 창 body 스타일 고도화 (유튜브/Apple 위젯 스타일)
                pipWindow.document.body.style.background = "var(--surface-base)";
                pipWindow.document.body.style.color = "var(--text-primary)";
                pipWindow.document.body.style.padding = "0"; 
                pipWindow.document.body.style.margin = "0";
                pipWindow.document.body.style.overflow = "hidden";
                pipWindow.document.body.style.display = "flex";
                pipWindow.document.body.style.flexDirection = "column";

                // --- 세련된 PiP 전용 헤더 생성 ---
                const pipHeader = pipWindow.document.createElement("div");
                pipHeader.style.cssText = `
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    padding: 10px 14px;
                    background: oklch(var(--overlay-base) / 0.02);
                    border-bottom: 1px solid var(--border-subtle);
                    flex-shrink: 0;
                    -webkit-app-region: drag; /* 드래그 가능 영역 (지원 시) */
                `;

                // 좌측: Live 배지
                const liveBadge = pipWindow.document.createElement("div");
                liveBadge.style.cssText = `
                    display: flex;
                    align-items: center;
                    gap: 6px;
                    font-size: 10px;
                    font-weight: 800;
                    color: var(--danger);
                    text-transform: uppercase;
                    letter-spacing: 0.05em;
                `;
                liveBadge.innerHTML = `<span style="width:6px; height:6px; background:var(--danger); border-radius:50%; box-shadow:0 0 8px var(--danger);"></span> LIVE`;
                
                // 중앙: 드래그 핸들 (세련된 형태)
                const handle = pipWindow.document.createElement("div");
                handle.style.cssText = `
                    width: 32px;
                    height: 4px;
                    background: oklch(var(--overlay-base) / 0.1);
                    border-radius: 2px;
                `;

                // 우측: 시간 표시 (메인 창과 동기화됨)
                const pipTimer = pipWindow.document.createElement("div");
                pipTimer.id = "pip-timer";
                pipTimer.style.cssText = `
                    font-family: var(--font-mono);
                    font-size: 11px;
                    color: var(--text-tertiary);
                `;
                pipTimer.textContent = document.getElementById("elapsed").textContent;

                pipHeader.append(liveBadge, handle, pipTimer);
                pipWindow.document.body.appendChild(pipHeader);

                // --- 내용 영역 ---
                const contentArea = pipWindow.document.createElement("div");
                contentArea.style.cssText = `
                    flex: 1;
                    overflow: hidden;
                    display: flex;
                    flex-direction: column;
                    padding: 8px 12px 12px;
                `;

                // transcript 요소 원래 위치 백업을 위한 placeholder 생성
                const placeholder = document.createElement("div");
                placeholder.id = "pip-placeholder";
                placeholder.className = "glass";
                placeholder.style.flex = "1";
                placeholder.style.display = "flex";
                placeholder.style.alignItems = "center";
                placeholder.style.justifyContent = "center";
                placeholder.style.color = "var(--text-tertiary)";
                const phSpan = document.createElement("span");
                phSpan.textContent = "미니 모드 실행 중";
                placeholder.appendChild(phSpan);
                
                transcriptContainer.parentNode.insertBefore(placeholder, transcriptContainer);

                // PiP 모드 클래스 추가 및 스타일 적용
                transcriptContainer.classList.add("pip-mode");
                transcriptContainer.style.border = "none";
                transcriptContainer.style.borderRadius = "0";
                transcriptContainer.style.background = "transparent"; 
                transcriptContainer.style.boxShadow = "none";
                transcriptContainer.style.backdropFilter = "none";
                transcriptContainer.style.webkitBackdropFilter = "none";
                transcriptContainer.style.height = "100%";
                transcriptContainer.style.maxHeight = "none";
                transcriptContainer.style.minHeight = "0";
                transcriptContainer.style.padding = "0 4px";
                
                contentArea.appendChild(transcriptContainer);
                pipWindow.document.body.appendChild(contentArea);

                // 시간 업데이트 연동을 위한 인터벌 (PiP 창 내 타이머)
                const timerUpdateId = setInterval(() => {
                    if (pipWindow && pipTimer) {
                        pipTimer.textContent = document.getElementById("elapsed").textContent;
                    } else {
                        clearInterval(timerUpdateId);
                    }
                }, 1000);

                // PIP 창이 닫힐 때 원래대로 복구
                pipWindow.addEventListener("pagehide", () => {
                    clearInterval(timerUpdateId);
                    const ph = document.getElementById("pip-placeholder");
// ... 나머지 복구 로직 ...
                    
                    // PiP 모드 클래스 제거 및 스타일 원상 복구
                    transcriptContainer.classList.remove("pip-mode");
                    transcriptContainer.style.border = "1px solid var(--border-subtle)";

                        ph.parentNode.replaceChild(transcriptContainer, ph);

            } catch (err) {

        function renderDeviceState(payload) {
            if (!deviceSelectEl || !deviceStatusEl) return;
            const devices = Array.isArray(payload?.devices) ? payload.devices : [];
            const targetValue = payload?.switching ? payload?.requested_device : payload?.current_device;
            const selectedValue = targetValue === null || targetValue === undefined ? "" : String(targetValue);

            deviceSelectEl.innerHTML = "";

            const defaultOption = document.createElement("option");
            defaultOption.value = "";
            defaultOption.textContent = "기본 장치";
            deviceSelectEl.appendChild(defaultOption);

            for (const info of devices) {
                const option = document.createElement("option");
                option.value = String(info.index);
                option.textContent = `[${info.index}] ${info.name}`;
                deviceSelectEl.appendChild(option);
            }

            deviceSelectEl.value = selectedValue;
            deviceSelectEl.disabled = Boolean(payload?.switching);

            if (payload?.error) {
                deviceStatusEl.textContent = payload.error;
            } else if (payload?.switching) {
                deviceStatusEl.textContent = `전환 중: ${payload?.requested_name || "기본 장치"}`;
            } else {
                deviceStatusEl.textContent = payload?.current_name || "기본 장치";
            }
        }

        async function loadAudioDevices(force = false) {
            if (!deviceSelectEl) return;
            const now = Date.now();
            if (!force && deviceRefreshInFlight) {
                return deviceRefreshInFlight;
            }
            if (!force && (now - lastDeviceRefreshAt) < 3000) {
                return;
            }

            deviceRefreshInFlight = (async () => {
                try {
                    const res = await fetch("/devices", { cache: "no-store" });
                    if (!res.ok) return;
                    const data = await res.json();
                    renderDeviceState(data);
                    lastDeviceRefreshAt = Date.now();
                } catch (e) {
                    if (deviceStatusEl) {
                        deviceStatusEl.textContent = "장치 확인 실패";
                    }
                } finally {
                    deviceRefreshInFlight = null;
                }
            })();

            return deviceRefreshInFlight;
        }

        async function switchInputDevice() {
            if (!deviceSelectEl || !deviceStatusEl) return;
            const rawValue = deviceSelectEl.value;
            const device = rawValue === "" ? null : Number(rawValue);
            deviceSelectEl.disabled = true;
            deviceStatusEl.textContent = "전환 요청 중...";

            try {
                const res = await fetch("/switch-device", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ device }),
                });
                const payload = await res.json();
                if (!res.ok) {
                    throw new Error(payload?.detail || "장치 전환 요청 실패");
                }
                renderDeviceState(payload);
            } catch (e) {
                deviceStatusEl.textContent = e.message || "장치 전환 실패";
                await loadAudioDevices(true);
            }
        }

        let _modalTrigger = null;
        let _trapCleanup = null;

        function trapFocus(modalEl) {
            const focusable = Array.from(modalEl.querySelectorAll(focusableSelector)).filter((element) => {
                if (element.closest("[inert]")) return false;
                if (element.getAttribute("aria-hidden") === "true") return false;
                if (element.hidden) return false;
                return true;
            });
            const fallbackTarget = focusable[0] || modalEl.querySelector(".modal-container") || modalEl;

            function handleKeydown(event) {
                if (event.key === "Escape") {
                    event.preventDefault();
                    closeModalAccessible(modalEl);
                    return;
                }
                if (event.key !== "Tab") return;
                if (focusable.length === 0) {
                    event.preventDefault();
                    fallbackTarget.focus();
                    return;
                }

                const first = focusable[0];
                const last = focusable[focusable.length - 1];
                if (event.shiftKey && document.activeElement === first) {
                    event.preventDefault();
                    last.focus();
                } else if (!event.shiftKey && document.activeElement === last) {
                    event.preventDefault();
                    first.focus();
                }
            }

            modalEl.addEventListener("keydown", handleKeydown);
            requestAnimationFrame(() => {
                fallbackTarget.focus();
            });

            return () => {
                modalEl.removeEventListener("keydown", handleKeydown);
            };
        }

        function _handleOverlayClick(e) {
            /* overlay 배경 클릭 시 모달 닫기 (modal-container 내부 클릭은 무시) */
            if (e.target === e.currentTarget) {
                closeModalAccessible(e.currentTarget);
            }
        }

        function openModalAccessible(modalEl) {
            if (!modalEl) return;
            if (activeModal && activeModal !== modalEl) {
                closeModalAccessible(activeModal, { restoreFocus: false });
            }

            _modalTrigger = document.activeElement instanceof HTMLElement ? document.activeElement : null;
            modalEl.addEventListener("click", _handleOverlayClick);
            modalEl.classList.add("open");
            modalEl.setAttribute("aria-hidden", "false");
            modalEl.removeAttribute("inert");
            _trapCleanup?.();
            _trapCleanup = trapFocus(modalEl);
            activeModal = modalEl;
        }

        function closeModalAccessible(modalEl, { restoreFocus = true } = {}) {
            if (!modalEl) return;

            modalEl.removeEventListener("click", _handleOverlayClick);
            modalEl.classList.remove("open");
            modalEl.setAttribute("aria-hidden", "true");
            modalEl.setAttribute("inert", "");
            _trapCleanup?.();
            _trapCleanup = null;

            if (activeModal === modalEl) {
                activeModal = null;
            }

            if (restoreFocus && _modalTrigger) {
                requestAnimationFrame(() => {
                    _modalTrigger.focus();
                });
            }
            _modalTrigger = null;
        }

        function setStartupState(startup) {

        function setConnectionState(status) {

        function toSpeakerClass(speaker) {
            const v = String(speaker || "").trim().toUpperCase();
            if (v === "A") return "speaker-a";
            if (v === "B") return "speaker-b";
            if (v === "C") return "speaker-c";
            if (v === "D") return "speaker-d";
            if (v === "E") return "speaker-e";
            if (v === "F") return "speaker-f";
            return "speaker-default";
        }

        function formatElapsed(totalSeconds) {
            const s = Math.max(0, Number(totalSeconds) || 0);
            const h = String(Math.floor(s / 3600)).padStart(2, "0");
            const m = String(Math.floor((s % 3600) / 60)).padStart(2, "0");
            const sec = String(s % 60).padStart(2, "0");
            return `${h}:${m}:${sec}`;
        }

        function parseClock(value) {
            const text = String(value || "").trim();
            const parts = text.split(":").map(Number);
            if (parts.length !== 3 || parts.some((part) => Number.isNaN(part))) {
                return null;
            }
            return (parts[0] * 3600) + (parts[1] * 60) + parts[2];
        }

        function canMergeTranscriptItem(lastLine, item) {
            if (!lastLine || !item || !item.text) return false;

            const lastSpeaker = String(lastLine.dataset.speaker || "").trim().toUpperCase();
            const nextSpeaker = String(item.speaker || "").trim().toUpperCase();
            if (!lastSpeaker || lastSpeaker !== nextSpeaker) return false;

            // 문장이 끝나면(마침표, 물음표, 느낌표) 병합하지 않고 새 버블 생성
            const lastText = lastLine.querySelector(".text").textContent.trim();
            if (/[.?!]$/.test(lastText)) return false;

            const lastTs = parseClock(lastLine.dataset.endTs || lastLine.dataset.startTs);
            const nextTs = parseClock(item.ts);
            if (lastTs === null || nextTs === null) return false;
            if ((nextTs - lastTs) > transcriptMergeGapSeconds) return false;

            const segmentCount = Number(lastLine.dataset.segmentCount || "1");
            if (segmentCount >= transcriptMergeMaxSegments) return false;

            const charCount = Number(lastLine.dataset.charCount || "0");
            const nextText = String(item.text || "").trim();
            return (charCount + 1 + nextText.length) <= transcriptMergeMaxChars;
        }

        function updateAutoScrollState() {
            const distance = transcriptEl.scrollHeight - transcriptEl.scrollTop - transcriptEl.clientHeight;
            autoScroll = distance < 28;
            autoScrollEl.textContent = autoScroll ? "자동 스크롤 ON" : "자동 스크롤 OFF";
        }

        let globalSegmentIndex = 0;

        /* === 가상 스크롤 관리자 === */
        const VirtualScroll = {
            allItems: [],           // 모든 전사 데이터 {text, speaker, timestamp, index}
            allElements: [],        // 모든 DOM 요소 참조 (렌더링용)
            heightMap: new Map(),   // 인덱스별 실측 높이 캐시
            RENDER_BUFFER: 40,      // 뷰포트 위아래 버퍼 라인 수
            DEFAULT_HEIGHT: 48,     // 미측정 라인 기본 높이 (px)
            VIRTUAL_THRESHOLD: 800, // 이 라인 수 이상이면 가상 스크롤 활성화
            enabled: false,

            get totalLines() {
                return this.allItems.length;
            },

            shouldEnable() {
                return this.totalLines >= this.VIRTUAL_THRESHOLD;
            },

            /* 전체 높이 계산 (heightMap 기반) */
            getTotalHeight() {
                let total = 0;
                for (let i = 0; i < this.totalLines; i++) {
                    total += this.heightMap.get(i) || this.DEFAULT_HEIGHT;
                }
                return total;
            },

            /* 특정 인덱스까지의 오프셋 계산 */
            getOffsetForIndex(idx) {
                let offset = 0;
                for (let i = 0; i < idx && i < this.totalLines; i++) {
                    offset += this.heightMap.get(i) || this.DEFAULT_HEIGHT;
                }
                return offset;
            },

            /* 스크롤 위치로부터 인덱스 계산 */
            getIndexForOffset(scrollTop) {
                let offset = 0;
                for (let i = 0; i < this.totalLines; i++) {
                    const h = this.heightMap.get(i) || this.DEFAULT_HEIGHT;
                    if (offset + h > scrollTop) return i;
                    offset += h;
                }
                return Math.max(0, this.totalLines - 1);
            },

            /* 렌더된 요소들의 실측 높이를 캐싱 */
            cacheHeights() {
                const children = transcriptEl.querySelectorAll("p[data-vs-index]");
                children.forEach(el => {
                    const idx = parseInt(el.dataset.vsIndex, 10);
                    if (!isNaN(idx) && el.offsetHeight > 0) {
                        this.heightMap.set(idx, el.offsetHeight);
                    }
                });
            },

            /* 특정 인덱스로 스크롤 이동 */
            scrollToIndex(idx) {
                if (idx < 0 || idx >= this.totalLines) return;
                this._lastStart = -1;
                this._lastEnd = -1;
                const offset = this.getOffsetForIndex(idx);
                const viewHeight = transcriptEl.clientHeight;
                const itemHeight = this.heightMap.get(idx) || this.DEFAULT_HEIGHT;
                transcriptEl.scrollTop = Math.max(0, offset - (viewHeight / 2) + (itemHeight / 2));
            },

            /* 가상 스크롤 활성화 시 뷰포트 계산 및 DOM 업데이트 */
            updateViewport() {
                if (!this.enabled || this.totalLines === 0) return;

                const scrollTop = transcriptEl.scrollTop;
                const viewHeight = transcriptEl.clientHeight;
                const totalHeight = this.getTotalHeight();

                // 보이는 범위 계산 (heightMap 기반)
                const startIdx = Math.max(0, this.getIndexForOffset(scrollTop) - this.RENDER_BUFFER);
                const endIdx = Math.min(this.totalLines, this.getIndexForOffset(scrollTop + viewHeight) + this.RENDER_BUFFER + 1);

                // 현재 렌더된 범위와 같으면 스킵
                if (this._lastStart === startIdx && this._lastEnd === endIdx) return;
                this._lastStart = startIdx;
                this._lastEnd = endIdx;

                // DOM 재구성
                const fragment = document.createDocumentFragment();

                // 상단 스페이서
                const topSpacer = document.createElement("div");
                topSpacer.className = "virtual-scroll-spacer";
                topSpacer.style.height = this.getOffsetForIndex(startIdx) + "px";
                fragment.appendChild(topSpacer);

                // 보이는 라인들만 렌더
                for (let i = startIdx; i < endIdx; i++) {
                    const el = this.allElements[i];
                    if (el) {
                        fragment.appendChild(el);
                    }
                }

                // 하단 스페이서
                const bottomSpacer = document.createElement("div");
                bottomSpacer.className = "virtual-scroll-spacer";
                const bottomOffset = this.getOffsetForIndex(endIdx);
                bottomSpacer.style.height = Math.max(0, totalHeight - bottomOffset) + "px";
                fragment.appendChild(bottomSpacer);

                // DOM 교체 (innerHTML 대신 안전한 방식)
                while (transcriptEl.firstChild) {
                    transcriptEl.removeChild(transcriptEl.firstChild);
                }
                transcriptEl.appendChild(fragment);

                // 렌더 후 실측 높이 캐싱
                requestAnimationFrame(() => this.cacheHeights());
            },

            /* named 스크롤 핸들러 (중복 바인딩 방지) */
            _scrollRAF: null,
            _onScroll: null,

            _initScrollHandler() {
                if (!this._onScroll) {
                    this._onScroll = () => {
                        if (!this.enabled) return;
                        if (this._scrollRAF) return;
                        this._scrollRAF = requestAnimationFrame(() => {
                            this.updateViewport();
                            this._scrollRAF = null;
                        });
                    };
                }
            },

            /* 가상 스크롤 활성화 */
            activate() {
                if (this.enabled) return;
                this.enabled = true;
                this._initScrollHandler();

                // 기존 DOM 라인들을 데이터로 변환
                const existingLines = Array.from(transcriptEl.querySelectorAll("p"));
                this.allElements = existingLines;
                this.allItems = existingLines.map((el, i) => {
                    el.dataset.vsIndex = String(i);
                    return {
                        text: el.querySelector(".text")?.textContent || "",
                        speaker: el.dataset.speaker || "",
                        timestamp: el.querySelector(".timestamp")?.textContent || "",
                        index: i,
                    };
                });

                // 스크롤 이벤트: 기존 제거 후 추가 (중복 방지)
                transcriptEl.removeEventListener("scroll", this._onScroll);
                transcriptEl.addEventListener("scroll", this._onScroll, { passive: true });
                this.updateViewport();
            },

            /* 가상 스크롤 비활성화 (전체 DOM 복원) */
            deactivate() {
                if (!this.enabled) return;
                this.enabled = false;
                this._lastStart = -1;
                this._lastEnd = -1;

                // 스크롤 리스너 제거
                if (this._onScroll) {
                    transcriptEl.removeEventListener("scroll", this._onScroll);
                }

                // 전체 DOM 복원 (innerHTML 대신 안전한 방식)
                while (transcriptEl.firstChild) {
                    transcriptEl.removeChild(transcriptEl.firstChild);
                }
                for (const el of this.allElements) {
                    if (el) {
                        transcriptEl.appendChild(el);
                    }
                }
            },

            /* 라인 추가 */
            addLine(element) {
                const idx = this.allElements.length;
                element.dataset.vsIndex = String(idx);
                this.allElements.push(element);
                this.allItems.push({
                    text: element.querySelector(".text")?.textContent || "",
                    speaker: element.dataset.speaker || "",
                    timestamp: element.querySelector(".timestamp")?.textContent || "",
                    index: idx,
                });

                // 임계값 도달 시 가상 스크롤 활성화
                if (!this.enabled && this.shouldEnable()) {
                    this.activate();
                } else if (this.enabled) {
                    this.updateViewport();
                }
            },

            /* 전체 리셋 */
            reset() {
                if (this._onScroll) {
                    transcriptEl.removeEventListener("scroll", this._onScroll);
                }
                this.allItems = [];
                this.allElements = [];
                this.heightMap = new Map();
                this.enabled = false;
                this._lastStart = -1;
                this._lastEnd = -1;
                this._scrollRAF = null;
            }
        };

        function appendTranscript(item) {
            // 빈 상태 제거
            if (emptyState) {
                emptyState.remove();
            }

            const code = String(item.speaker || "?").toUpperCase();
            const nextText = String(item.text || "").trim();
            const nextTs = String(item.ts || "--:--:--").trim() || "--:--:--";

            // 가상 스크롤 비활성 상태에서는 DOM에서 직접 lastChild 참조
            // 가상 스크롤 활성 상태에서는 renderedLines에서 마지막 요소 참조
            const lastLine = VirtualScroll.enabled
                ? (VirtualScroll.allElements.length > 0 ? VirtualScroll.allElements[VirtualScroll.allElements.length - 1] : null)
                : transcriptEl.lastElementChild;

            if (canMergeTranscriptItem(lastLine, { speaker: code, text: nextText, ts: nextTs })) {
                const ts = lastLine.querySelector(".timestamp");
                const text = lastLine.querySelector(".text");
                const startTs = lastLine.dataset.startTs || nextTs;
                lastLine.dataset.endTs = nextTs;
                lastLine.dataset.segmentCount = String(Number(lastLine.dataset.segmentCount || "1") + 1);
                lastLine.dataset.charCount = String(Number(lastLine.dataset.charCount || "0") + 1 + nextText.length);
                ts.textContent = startTs === nextTs ? startTs : `${startTs} ~ ${nextTs}`;
                const segSpan = document.createElement("span");
                segSpan.dataset.segmentIndex = String(globalSegmentIndex++);
                segSpan.textContent = " " + nextText;
                text.appendChild(segSpan);

                // allItems 데이터도 갱신
                if (VirtualScroll.allItems.length > 0) {
                    const lastItem = VirtualScroll.allItems[VirtualScroll.allItems.length - 1];
                    lastItem.text = text.textContent;
                    lastItem.timestamp = ts.textContent;
                }

                if (autoScroll) {
                    if (VirtualScroll.enabled) {
                        VirtualScroll.updateViewport();
                    }
                    transcriptEl.scrollTop = transcriptEl.scrollHeight;
                }
                return;
            }

            const line = document.createElement("p");
            line.dataset.speaker = code;
            line.dataset.startTs = nextTs;

        let reconnectAttempts = 0;
        let reconnectTimer = null;
        const MAX_RECONNECT_DELAY = 30000; // 30초
        const DISCONNECTED_THRESHOLD = 5;  // 이 횟수 이상 실패 시 "연결 끊김" 상태

        function connectStream() {
            // 과거 세션 조회 중이면 재연결하지 않음
            if (AppState.currentView === "history") {
                console.log("[SSE] 과거 세션 조회 중 — 재연결 생략");
                return;
            }

            if (reconnectTimer) {
                clearTimeout(reconnectTimer);
                reconnectTimer = null;
            }
            if (source) source.close();
            source = new EventSource("/stream");

            source.onopen = () => {
                // 재연결인 경우 누락 메시지 동기화
                if (reconnectAttempts > 0) {
                    syncMissedMessages();
                }
                setConnectionState("connected");
                reconnectAttempts = 0;
            };

            source.onmessage = (event) => {
                try {
                    appendTranscript(JSON.parse(event.data));
                } catch (e) { /* 파싱 오류 무시 */ }
            };

            source.onerror = () => {
                source.close();
                // 과거 세션 조회 중이면 재연결하지 않음
                if (AppState.currentView === "history") return;

                // 일정 횟수 이상 실패 시 "연결 끊김" 상태로 전환
                if (reconnectAttempts >= DISCONNECTED_THRESHOLD) {
                    setConnectionState("disconnected");
                    resetPostprocessUI(true);
                } else {
                    setConnectionState("reconnecting");
                }

                // 지수 백오프: 1s, 2s, 4s, 8s, 16s, max 30s
                const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), MAX_RECONNECT_DELAY);
                reconnectAttempts++;
                console.log(`[SSE] 재연결 시도 ${reconnectAttempts} (${delay/1000}초 후)`);
                reconnectTimer = setTimeout(connectStream, delay);
            };

            source.addEventListener("correction", (event) => {
                try {
                    const data = JSON.parse(event.data);
                    const corrections = data.corrections || [];
                    for (const c of corrections) {
                        applyCorrectionToSegment(c.index, c.corrected);
                    }
                } catch (e) {
                    console.error("[교정] 이벤트 처리 실패:", e);
                }
            });

            // 후처리 진행 SSE (폴링보다 즉시 반영)
            source.addEventListener("polish_progress", (event) => {
                try {
                    const data = JSON.parse(event.data);
                    updateSessionProgress(data);
                } catch (e) { /* 파싱 오류 무시 */ }
            });

            // 세션 생성/수정/삭제 SSE 이벤트 리스너
            attachSessionSSEListeners(source);
        }

        /* === 재연결 시 누락 메시지 동기화 === */
        async function syncMissedMessages() {
            try {
                const res = await fetch("/history", { cache: "no-store" });
                if (!res.ok) return;
                const fullHistory = await res.json();
                if (!Array.isArray(fullHistory)) return;

                // 현재 표시된 세그먼트 수 (개별 세그먼트 span 기준)
                const currentCount = transcriptEl.querySelectorAll("[data-segment-index]").length;
                if (fullHistory.length > currentCount) {
                    const missed = fullHistory.slice(currentCount);
                    for (const item of missed) {
                        appendTranscript(item);
                    }
                    console.log(`[SSE] ${missed.length}개 누락 메시지 동기화 완료`);
                }
            } catch (e) {
                console.warn("[SSE] 누락 메시지 동기화 실패:", e);
            }
        }

        function applyCorrectionToSegment(index, correctedText) {
            // 세그먼트별 span에서 직접 찾기
            const segSpan = transcriptEl.querySelector(`[data-segment-index="${index}"]`);
            if (!segSpan) return;

            // 교정 텍스트에서 "- [HH:MM:SS] [화자] " 접두사 제거 (있는 경우)
            let cleanText = correctedText;
            const prefixMatch = correctedText.match(/^- \[\d{2}:\d{2}:\d{2}\] \[[^\]]+\] (.+)$/);
            if (prefixMatch) {
                cleanText = prefixMatch[1];
            }

            // 병합된 버블 내 개별 세그먼트 텍스트만 교체
            const isFirst = !segSpan.previousElementSibling;
            segSpan.textContent = isFirst ? cleanText : " " + cleanText;

            // 시각적 피드백: 부모 버블 하이라이트
            const bubble = segSpan.closest("p");
            if (bubble) {
                bubble.classList.add("corrected");
                setTimeout(() => bubble.classList.remove("corrected"), 2000);
            }
        }

        let statusFailCount = 0;

                // 후처리 상태

                if (data.postprocess) {

            } catch (e) {

        async function startRecording() {
            if (isRecording) return;
            const nameEl = document.getElementById("enroll-name");
            const name = (nameEl?.value || "").trim();
            if (!name) {
                setEnrollStatus("이름을 먼저 입력해주세요", "error");
                nameEl?.focus();
                return;
            }

            const btn = document.getElementById("btn-record");
            const timerEl = document.getElementById("record-timer");
            isRecording = true;
            btn.textContent = "녹음 중...";
            btn.classList.add("recording");
            setEnrollStatus("말씀해 주세요... (5초)", "info");

            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioCtx = new AudioContext({ sampleRate: 16000 });
                const source = audioCtx.createMediaStreamSource(mediaStream);
                const processor = audioCtx.createScriptProcessor(4096, 1, 1);
                const chunks = [];

                processor.onaudioprocess = (e) => {
                    chunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
                };
                source.connect(processor);
                processor.connect(audioCtx.destination);

                // 카운트다운
                let remaining = 5;
                timerEl.textContent = remaining;
                recordTimer = setInterval(() => {
                    remaining--;
                    timerEl.textContent = remaining > 0 ? remaining : "";
                    if (remaining <= 0) clearInterval(recordTimer);
                }, 1000);

                // 5초 후 정지
                await new Promise(r => setTimeout(r, 5000));

                source.disconnect();
                processor.disconnect();
                mediaStream.getTracks().forEach(t => t.stop());
                await audioCtx.close();

                // PCM float32 결합 → base64
                const totalLen = chunks.reduce((s, c) => s + c.length, 0);
                const pcm = new Float32Array(totalLen);
                let offset = 0;
                for (const c of chunks) {
                    pcm.set(c, offset);
                    offset += c.length;
                }
                const b64 = arrayBufferToBase64(pcm.buffer);

                btn.textContent = "등록 중...";
                setEnrollStatus("서버에 등록 요청 중...", "info");

                const res = await fetch("/enroll", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, audio: b64, sample_rate: 16000 }),
                });
                const data = await res.json();

                if (data.ok) {
                    setEnrollStatus(`'${data.name}' 등록 완료!`, "success");
                    renderSpeakerTags(data.speakers || []);
                    if (nameEl) nameEl.value = "";
                } else {
                    setEnrollStatus(data.error || "등록 실패", "error");
                }
            } catch (e) {
                setEnrollStatus("마이크 접근 실패: " + e.message, "error");
            } finally {
                isRecording = false;
                const b = document.getElementById("btn-record");
                if (b) { b.textContent = "녹음 5초"; b.classList.remove("recording"); }
                clearInterval(recordTimer);
                const t = document.getElementById("record-timer");
                if (t) t.textContent = "";
            }
        }

        function arrayBufferToBase64(buffer) {
            const bytes = new Uint8Array(buffer);
            let binary = "";
            for (let i = 0; i < bytes.length; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary);
        }

        // 검색 결과 네비게이션 키보드 (Enter/Shift+Enter)
        sessionSearchInput.addEventListener("keydown", (e) => {

        /* === 검색 상태 관리 === */
        let searchMatchCount = 0;
        let searchCurrentIndex = -1;

        /* === 전사 텍스트 검색 하이라이트 (네비게이션 포함) === */
        function highlightTranscript(query) {
            const transcript = document.getElementById("transcript");
            if (!transcript) return;

            // 가상 스크롤 활성 시 전체 DOM 복원 후 검색
            const wasVirtualScrollEnabled = VirtualScroll.enabled;
            if (wasVirtualScrollEnabled) {
                VirtualScroll.deactivate();
            }

            // 기존 하이라이트 제거 (원본 텍스트 복원)
            const marks = transcript.querySelectorAll("mark");
            marks.forEach(mark => {
                const parent = mark.parentNode;
                parent.replaceChild(document.createTextNode(mark.textContent), mark);
                parent.normalize();
            });

            // 기존 검색 결과 안내 제거
            const oldInfo = transcript.querySelector(".search-result-info");
            if (oldInfo) oldInfo.remove();

            // 검색 상태 리셋
            searchMatchCount = 0;
            searchCurrentIndex = -1;

            const navBar = document.getElementById("search-nav-bar");
            const navCounter = document.getElementById("search-nav-counter");

            if (!query) {
                // 검색 해제 시 가상 스크롤 재활성
                if (wasVirtualScrollEnabled) {
                    VirtualScroll.activate();
                }
                navBar.classList.remove("visible");
                return;
            }

            // 대소문자 무시 정규식 생성 (특수문자 이스케이프)
            const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            const regex = new RegExp(escaped, "gi");

            // .text 요소들에서 텍스트 노드를 찾아 하이라이트
            const textSpans = transcript.querySelectorAll(".text");
            textSpans.forEach(span => {
                const walker = document.createTreeWalker(span, NodeFilter.SHOW_TEXT, null, false);
                const textNodes = [];
                let node;
                while ((node = walker.nextNode())) {
                    textNodes.push(node);
                }

                textNodes.forEach(textNode => {
                    const text = textNode.textContent;
                    if (!regex.test(text)) return;
                    regex.lastIndex = 0;

                    const fragment = document.createDocumentFragment();
                    let lastIndex = 0;
                    let match;

                    while ((match = regex.exec(text)) !== null) {
                        searchMatchCount++;
                        if (match.index > lastIndex) {
                            fragment.appendChild(document.createTextNode(text.slice(lastIndex, match.index)));
                        }
                        const mark = document.createElement("mark");
                        mark.textContent = match[0];
                        mark.dataset.searchIndex = String(searchMatchCount - 1);
                        fragment.appendChild(mark);
                        lastIndex = regex.lastIndex;
                    }

                    if (lastIndex < text.length) {
                        fragment.appendChild(document.createTextNode(text.slice(lastIndex)));
                    }

                    textNode.parentNode.replaceChild(fragment, textNode);
                });
            });

            // 네비게이션 바 표시/숨김
            if (searchMatchCount > 0) {
                navBar.classList.add("visible");
                navCounter.textContent = `0/${searchMatchCount}`;
                // 첫 번째 결과로 자동 이동
                navigateSearch(1);
            } else {
                navBar.classList.add("visible");
                navCounter.textContent = "0/0";
            }

            // 검색 결과 안내
            const info = document.createElement("div");
            info.className = "search-result-info";
            info.setAttribute("role", "status");
            info.setAttribute("aria-live", "polite");
            info.style.cssText = "padding:8px 12px;font-size:var(--text-xs);color:var(--text-tertiary);text-align:center;";
            if (searchMatchCount > 0) {
                info.textContent = `${searchMatchCount}건 일치`;
            } else {
                info.textContent = `"${query}"에 대한 검색 결과가 없습니다`;
            }
            transcript.insertBefore(info, transcript.firstChild);
        }

        /* === 검색 결과 네비게이션 === */
        function navigateSearch(direction) {
            if (searchMatchCount === 0) return;

            const transcript = document.getElementById("transcript");
            const allMarks = transcript.querySelectorAll("mark[data-search-index]");
            if (allMarks.length === 0) return;

            // 현재 하이라이트 제거
            if (searchCurrentIndex >= 0 && searchCurrentIndex < allMarks.length) {
                allMarks[searchCurrentIndex].classList.remove("search-current");
            }

            // 다음/이전 인덱스 계산 (순환)
            if (searchCurrentIndex < 0) {
                searchCurrentIndex = direction > 0 ? 0 : allMarks.length - 1;
            } else {
                searchCurrentIndex += direction;
                if (searchCurrentIndex >= allMarks.length) searchCurrentIndex = 0;
                if (searchCurrentIndex < 0) searchCurrentIndex = allMarks.length - 1;
            }

            // 현재 결과 하이라이트 + 스크롤
            const currentMark = allMarks[searchCurrentIndex];
            currentMark.classList.add("search-current");
            currentMark.scrollIntoView({ behavior: "smooth", block: "center" });

            // 카운터 업데이트
            const navCounter = document.getElementById("search-nav-counter");
            navCounter.textContent = `${searchCurrentIndex + 1}/${searchMatchCount}`;
        }

        /* === 검색 초기화 === */
        function clearSearch() {
            const input = document.getElementById("session-search-input");
            if (input) input.value = "";
            highlightTranscript("");
            loadSessionList();
        }

        /* 검색 결과의 <p> 요소에서 가상 스크롤 인덱스 추출 */
        function getVsIndexFromMark(markEl) {
            const p = markEl.closest("p[data-vs-index]");
            return p ? parseInt(p.dataset.vsIndex, 10) : -1;
        }

        // 날짜 필터 변경 시 즉시 검색
        document.getElementById("session-date-from").addEventListener("change", () => loadSessionList());
        document.getElementById("session-date-to").addEventListener("change", () => loadSessionList());

        /* === SSE 세션 이벤트 리스너 등록 === */
        function attachSessionSSEListeners(eventSource) {
            eventSource.addEventListener("session_created", () => {
                loadSessionList();
            });
            eventSource.addEventListener("session_updated", () => {
                loadSessionList();
            });
            eventSource.addEventListener("session_deleted", (event) => {
                try {
                    const data = JSON.parse(event.data);
                    const deletedId = data.id || data.session_id;
                    // 현재 보고 있는 세션이 삭제된 경우 실시간으로 복귀
                    if (deletedId && AppState.currentView === "history" && AppState.currentSessionId === deletedId) {
                        returnToLiveSession();
                    }
                } catch (e) { /* 파싱 실패 무시 */ }
                loadSessionList();
            });
        }

        loadKeywords();
        loadSpeakerCount();
        loadAudioDevices(true);
        loadSessionList();
        loadHistory().finally(() => {
            connectStream();
        });
        (function poll() {
            refreshStatus();
            // 세션 목록 30초마다 갱신
            if (Date.now() - (poll._lastSessionRefresh || 0) > 30000) {
                loadSessionList();
                poll._lastSessionRefresh = Date.now();
            }
            setTimeout(poll, isPaused ? 5000 : 1000);
        })();
    </script>
</body>
</html>
