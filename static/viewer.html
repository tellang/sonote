<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>회의 실시간 전사</title>
    <style>
        :root, :root[data-theme="dark"] {
            /* === Surface 계층 (OKLCH 기반) === */
            --surface-base:     oklch(0.13 0.01 270);
            --surface-1:        oklch(0.17 0.012 270);
            --surface-2:        oklch(0.21 0.014 270);
            --surface-3:        oklch(0.25 0.016 270);

            /* === 텍스트 계층 === */
            --text-primary:     oklch(0.93 0.005 270);
            --text-secondary:   oklch(0.65 0.01 270);
            --text-tertiary:    oklch(0.58 0.01 270);

            /* === 시맨틱 === */
            --accent:           oklch(0.68 0.16 250);
            --ok:               oklch(0.70 0.15 145);
            --warn:             oklch(0.75 0.14 75);
            --danger:           oklch(0.65 0.20 25);

            /* === 화자 색상 (밝기·채도 통일, Hue만 변경) === */
            --speaker-a:        oklch(0.75 0.14 230);
            --speaker-b:        oklch(0.75 0.14 150);
            --speaker-c:        oklch(0.75 0.14 70);
            --speaker-d:        oklch(0.75 0.14 310);
            --speaker-e:        oklch(0.75 0.14 350);
            --speaker-f:        oklch(0.75 0.14 185);

            /* === 보더 === */
            --border:           oklch(0.30 0.01 270 / 0.5);
            --border-subtle:    oklch(0.30 0.01 270 / 0.25);
            
            --overlay-base:     1 0 0;
            --sidebar-bg:       oklch(0.12 0.012 270 / 0.88);
            --glass-bg:         oklch(var(--overlay-base) / 0.03);
            --input-bg:         oklch(0.15 0.01 270 / 0.6);
            --transcript-bg:    oklch(0.15 0.01 270 / 0.5);

            --history-opacity:  0.4;
        }

        /* 라이트 모드: data-theme="light"로만 한정 (JS initTheme이 항상 설정) */
        :root[data-theme="light"] {
            --surface-base:     oklch(0.98 0.005 270);
            --surface-1:        oklch(0.95 0.01 270);
            --surface-2:        oklch(0.92 0.015 270);
            --surface-3:        oklch(0.89 0.02 270);

            --text-primary:     oklch(0.20 0.01 270);
            --text-secondary:   oklch(0.40 0.01 270);
            --text-tertiary:    oklch(0.42 0.01 270);

            --accent:           oklch(0.55 0.16 250);
            --ok:               oklch(0.45 0.15 145);
            --warn:             oklch(0.55 0.14 75);
            --danger:           oklch(0.50 0.20 25);

            --border:           oklch(0.85 0.01 270 / 0.8);
            --border-subtle:    oklch(0.85 0.01 270 / 0.4);

            --overlay-base:     0 0 0;
            --sidebar-bg:       oklch(0.96 0.005 270 / 0.85);
            --glass-bg:         oklch(1 0 0 / 0.4);
            --input-bg:         oklch(1 0 0 / 0.6);
            --transcript-bg:    oklch(1 0 0 / 0.4);

            --speaker-a:        oklch(0.45 0.14 230);
            --speaker-b:        oklch(0.45 0.14 150);
            --speaker-c:        oklch(0.45 0.14 70);
            --speaker-d:        oklch(0.45 0.14 310);
            --speaker-e:        oklch(0.45 0.14 350);
            --speaker-f:        oklch(0.45 0.14 185);

            --history-opacity:  0.65;
        }

        /* === 타이포그래피 + 모션 (공통) === */
        :root {
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI",
                         Roboto, Helvetica, Arial, sans-serif;
            --font-mono: ui-monospace, "SF Mono", "SFMono-Regular",
                         Menlo, Consolas, monospace;

            --text-xs:    clamp(0.7rem,   0.65rem + 0.25vw,  0.78rem);
            --text-sm:    clamp(0.82rem,  0.78rem + 0.2vw,   0.9rem);
            --text-base:  clamp(0.95rem,  0.88rem + 0.35vw,  1.1rem);
            --text-lg:    clamp(1.1rem,   1rem + 0.5vw,      1.35rem);
            --text-xl:    clamp(1.4rem,   1.2rem + 1vw,      2rem);

            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-in-out:   cubic-bezier(0.45, 0, 0.55, 1);
            --dur-fast:   150ms;
            --dur-normal: 300ms;
            --dur-slow:   500ms;
        }

        /* === 스크린 리더 전용 === */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            background: var(--surface-base);
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: var(--text-base);
            line-height: 1.5;
            height: 100%;
            min-height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        html::-webkit-scrollbar,
        body::-webkit-scrollbar {
            display: none;
        }

        /* === 앱 레이아웃 (사이드바 + 메인) === */
        .app-layout {
            display: flex;
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }

        /* === 사이드바 === */
        .sidebar {
            width: 272px;
            min-width: 200px;
            height: 100vh;
            background: var(--sidebar-bg);
            backdrop-filter: blur(24px) saturate(140%);
            -webkit-backdrop-filter: blur(24px) saturate(140%);
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform var(--dur-slow) var(--ease-out-expo),
                        width var(--dur-slow) var(--ease-out-expo),
                        opacity var(--dur-normal) var(--ease-out-expo);
            z-index: 100;
            position: relative;
        }

        /* 사이드바 접힘 상태 */
        .sidebar.collapsed {
            width: 0;
            min-width: 0;
            overflow: hidden;
            border-right: none;
            opacity: 0;
            pointer-events: none;
        }

        /* 사이드바 상단 섹션 */
        .sidebar-header {
            padding: 20px 16px 12px;
            flex-shrink: 0;
        }

        .session-nav {
            display: flex;
            flex: 1;
            min-height: 0;
            flex-direction: column;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .sidebar-title {
            font-size: var(--text-sm);
            font-weight: 700;
            color: var(--text-secondary);
            letter-spacing: -0.01em;
            text-transform: uppercase;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.06em;
        }

        /* 새 세션 버튼 */
        .new-session-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid var(--border-subtle);
            background: oklch(var(--overlay-base) / 0.04);
            color: var(--text-primary);
            font-size: var(--text-sm);
            font-weight: 600;
            font-family: var(--font-sans);
            cursor: pointer;
            transition: all var(--dur-fast) var(--ease-out-expo);
            position: relative;
            overflow: hidden;
        }

        .new-session-btn::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, oklch(var(--overlay-base) / 0.02), oklch(var(--overlay-base) / 0.06));
            opacity: 0;
            transition: opacity var(--dur-fast);
        }

        .new-session-btn:hover::before {
            opacity: 1;
        }

        .new-session-btn:hover {
            border-color: color-mix(in oklch, var(--accent) 40%, transparent);
            transform: translateY(-0.5px);
            box-shadow: 0 2px 12px oklch(0 0 0 / 0.15);
        }

        .new-session-btn:active {
            transform: scale(0.98);
        }

        .new-session-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .new-session-btn:disabled:hover {
            border-color: var(--border-subtle);
            box-shadow: none;
        }

        .new-session-btn:disabled::before {
            opacity: 0;
        }

        .new-session-btn .icon {
            font-size: 1.1em;
            font-weight: 300;
            opacity: 0.7;
        }

        /* 세션 리스트 */
        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
        }

        .session-list::-webkit-scrollbar {
            width: 6px;
        }

        .session-list::-webkit-scrollbar-thumb {
            background: oklch(var(--overlay-base) / 0.08);
            border-radius: 3px;
        }

        .session-list:hover::-webkit-scrollbar-thumb {
            background: oklch(var(--overlay-base) / 0.16);
        }

        /* 날짜 그룹 헤더 */
        .session-group-header {
            padding: 14px 16px 6px;
            font-size: 0.68rem;
            font-weight: 600;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-family: var(--font-mono);
        }

        .session-group-header:first-child {
            padding-top: 8px;
        }

        /* 세션 항목 */
        .session-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            margin: 1px 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all var(--dur-fast) var(--ease-out-expo);
            position: relative;
            border: 1px solid transparent;
        }

        .session-item:hover {
            background: oklch(var(--overlay-base) / 0.05);
        }

        .session-item.active {
            background: oklch(var(--overlay-base) / 0.07);
            border-color: var(--border-subtle);
        }

        .session-item.active::before {
            content: "";
            position: absolute;
            left: 0;
            top: 20%;
            bottom: 20%;
            width: 3px;
            border-radius: 0 2px 2px 0;
            background: var(--accent);
        }

        .session-item:focus-visible {
            outline: 2px solid color-mix(in oklch, var(--accent) 60%, white 10%);
            outline-offset: 2px;
            border-color: color-mix(in oklch, var(--accent) 45%, transparent);
            background: oklch(var(--overlay-base) / 0.06);
        }

        /* 실시간 세션 표시 */
        .session-live-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--ok);
            flex-shrink: 0;
            position: relative;
        }

        .session-live-dot::before {
            content: "";
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: var(--ok);
            opacity: 0;
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .session-item-info {
            flex: 1;
            min-width: 0;
        }

        .session-item-title {
            font-size: var(--text-sm);
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }

        .session-item-meta {
            font-size: 0.7rem;
            color: var(--text-tertiary);
            font-family: var(--font-mono);
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 2px;
        }

        .session-live-label {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--ok);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        /* 사이드바 후처리 진행 표시 */
        .session-progress {
            margin-top: 6px;
            display: none;
        }
        .session-progress.active {
            display: block;
        }
        .session-progress-bar {
            height: 3px;
            background: var(--surface-3);
            border-radius: 2px;
            overflow: hidden;
        }
        .session-progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.3s ease;
        }
        .session-progress-label {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-top: 2px;
        }

        /* 사이드바 하단 (실시간 복귀 버튼) */
        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border-subtle);
            flex-shrink: 0;
        }

        .return-live-btn {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 9px 14px;
            border-radius: 10px;
            border: 1px solid color-mix(in oklch, var(--ok) 30%, transparent);
            background: color-mix(in oklch, var(--ok) 8%, transparent);
            color: var(--ok);
            font-size: var(--text-xs);
            font-weight: 600;
            font-family: var(--font-sans);
            cursor: pointer;
            transition: all var(--dur-fast) var(--ease-out-expo);
        }

        .return-live-btn.visible {
            display: flex;
        }

        .return-live-btn:hover {
            background: color-mix(in oklch, var(--ok) 14%, transparent);
            transform: translateY(-0.5px);
        }

        .return-live-btn:active {
            transform: scale(0.98);
        }

        .return-live-btn .live-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--ok);
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        /* 세션 삭제 버튼 */
        .session-delete-btn {
            display: none;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: var(--text-tertiary);
            cursor: pointer;
            font-size: 14px;
            flex-shrink: 0;
            padding: 0;
            transition: all var(--dur-fast);
        }

        .session-item:hover .session-delete-btn {
            display: flex;
        }

        .session-delete-btn:hover {
            background: color-mix(in oklch, var(--danger) 15%, transparent);
            color: var(--danger);
        }

        /* 세션 검색/필터 영역 */
        .session-search {
            padding: 0 12px 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0;
        }

        .session-search-results {
            min-height: 1.1rem;
            padding-left: 2px;
            font-size: 0.72rem;
            color: var(--text-tertiary);
            font-family: var(--font-mono);
        }

        .session-search-input {
            width: 100%;
            padding: 7px 10px 7px 30px;
            border-radius: 8px;
            border: 1px solid var(--border-subtle);
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: var(--text-xs);
            font-family: var(--font-sans);
            outline: none;
            transition: border-color var(--dur-fast);
        }

        .session-search-input:focus {
            border-color: color-mix(in oklch, var(--accent) 50%, transparent);
        }

        .session-search-input::placeholder {
            color: var(--text-tertiary);
        }

        .session-search-wrap {
            position: relative;
        }

        .session-search-icon {
            position: absolute;
            left: 9px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
            font-size: 12px;
            pointer-events: none;
        }

        .session-date-filters {
            display: none;
            gap: 4px;
            align-items: center;
        }

        .session-date-filters.visible {
            display: flex;
        }

        .session-date-input {
            flex: 1;
            padding: 5px 6px;
            border-radius: 6px;
            border: 1px solid var(--border-subtle);
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 0.65rem;
            font-family: var(--font-mono);
            outline: none;
            transition: border-color var(--dur-fast);
        }

        .session-date-input:focus {
            border-color: color-mix(in oklch, var(--accent) 50%, transparent);
        }

        .session-filter-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: 1px solid var(--border-subtle);
            background: transparent;
            color: var(--text-tertiary);
            cursor: pointer;
            font-size: 12px;
            flex-shrink: 0;
            padding: 0;
            transition: all var(--dur-fast);
        }

        .session-filter-toggle:hover {
            background: oklch(var(--overlay-base) / 0.06);
            color: var(--text-secondary);
        }

        .session-filter-toggle.active {
            color: var(--accent);
            border-color: color-mix(in oklch, var(--accent) 40%, transparent);
        }

        .session-date-sep {
            color: var(--text-tertiary);
            font-size: 0.65rem;
            flex-shrink: 0;
        }

        /* 삭제 확인 모달 */
        #delete-modal .modal-title {
            color: var(--danger);
        }

        /* 사이드바 빈 상태 */
        .session-empty {
            padding: 32px 16px;
            text-align: center;
            color: var(--text-tertiary);
            font-size: var(--text-xs);
            line-height: 1.6;
        }

        .session-empty .icon {
            display: block;
            font-size: 1.6rem;
            opacity: 0.3;
            margin-bottom: 8px;
        }

        /* 사이드바 토글 버튼 (헤더 내) */
        .sidebar-toggle {
            display: none;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid var(--border-subtle);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: var(--text-sm);
            transition: all var(--dur-fast) var(--ease-out-expo);
            flex-shrink: 0;
            line-height: 1;
            padding: 0;
        }

        .sidebar-toggle:hover {
            background: oklch(var(--overlay-base) / 0.06);
            color: var(--text-primary);
        }

        .sidebar-close {
            display: none;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: var(--text-tertiary);
            cursor: pointer;
            font-size: var(--text-xs);
            transition: all var(--dur-fast);
            flex-shrink: 0;
            padding: 0;
        }

        .sidebar-close:hover {
            background: oklch(var(--overlay-base) / 0.08);
            color: var(--text-secondary);
        }

        /* 과거 세션 뷰 배너 */
        .history-banner {
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 16px;
            border-radius: 10px;
            background: color-mix(in oklch, var(--accent) 8%, transparent);
            border: 1px solid color-mix(in oklch, var(--accent) 20%, transparent);
            font-size: var(--text-xs);
            color: var(--accent);
            animation: chip-in 0.3s var(--ease-out-expo) both;
        }

        .history-banner.visible {
            display: flex;
        }

        .history-banner-text {
            font-weight: 500;
        }

        .history-banner-btn {
            padding: 4px 12px;
            border-radius: 6px;
            border: 1px solid color-mix(in oklch, var(--ok) 40%, transparent);
            background: color-mix(in oklch, var(--ok) 10%, transparent);
            color: var(--ok);
            font-size: var(--text-xs);
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font-sans);
            transition: all var(--dur-fast);
            white-space: nowrap;
        }

        .history-banner-btn:hover {
            background: color-mix(in oklch, var(--ok) 18%, transparent);
        }

        /* 메인 콘텐츠 래퍼 */
        .main-content {
            flex: 1;
            min-width: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .main-content::-webkit-scrollbar {
            display: none;
        }

        /* === 페이지 레이아웃 === */
        .page {
            max-width: 860px;
            margin: 0 auto;
            padding: 28px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            height: 100vh;
            overflow-y: auto;
        }

        .page::-webkit-scrollbar {
            display: none;
        }

        /* === 헤더 === */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .header h1 {
            flex: 1;
        }

        h1 {
            font-size: var(--text-xl);
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.15;
        }

        .header-badge {
            font-size: var(--text-xs);
            color: var(--text-tertiary);
            font-family: var(--font-mono);
            letter-spacing: 0.01em;
        }

        /* === Glass Surface 공통 === */
        .glass {
            background: oklch(var(--overlay-base) / 0.03);
            backdrop-filter: blur(24px) saturate(150%);
            -webkit-backdrop-filter: blur(24px) saturate(150%);
            border: none;
            border-radius: 14px;
            position: relative;
            box-shadow:
                0 4px 24px -1px oklch(0 0 0 / 0.2),
                inset 0 0 0 0.5px oklch(var(--overlay-base) / 0.08);
        }

        .glass::before {
            content: "";
            position: absolute;
            top: 0;
            left: 12%;
            right: 12%;
            height: 1px;
            background: linear-gradient(90deg, transparent, oklch(var(--overlay-base) / 0.06), transparent);
            border-radius: 1px;
            pointer-events: none;
        }

        @supports not (backdrop-filter: blur(1px)) {
            .glass { background: oklch(0.17 0.012 270 / 0.95); }
        }

        /* === 상태 바 === */
        #status-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            padding: 12px 16px;
            font-size: var(--text-sm);
            font-family: var(--font-mono);
        }

        .status-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .status-group-device {
            flex: 1 1 auto;
            justify-content: flex-end;
            min-width: 280px;
        }

        .device-picker {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            white-space: nowrap;
        }

        #device-select {
            min-width: 200px;
            max-width: 100%;
            padding: 6px 12px;
            border-radius: 10px;
            border: 1px solid var(--border-subtle);
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: var(--text-xs);
            font-family: var(--font-sans);
            outline: none;
            text-overflow: ellipsis;
        }

        #device-select:disabled {
            opacity: 0.6;
            cursor: wait;
        }

        #device-status {
            max-width: 240px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* === 연결 상태 (라이브 dot) === */
        #connection-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: var(--text-xs);
            font-weight: 500;
            border: 1px solid var(--border-subtle);
            transition: all var(--dur-normal) var(--ease-out-expo);
        }

        .live-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
            position: relative;
        }

        #connection-status.connected {
            color: var(--ok);
            background: color-mix(in oklch, var(--ok) 8%, transparent);
        }

        #connection-status.connected .live-dot {
            background: var(--ok);
        }

        #connection-status.connected .live-dot::before {
            content: "";
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: var(--ok);
            opacity: 0;
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        #connection-status.reconnecting {
            color: var(--warn);
            background: color-mix(in oklch, var(--warn) 8%, transparent);
            animation: status-breathe 2s ease-in-out infinite;
        }

        #connection-status.reconnecting .live-dot {
            background: var(--warn);
        }

        #connection-status.disconnected {
            color: var(--danger);
            background: color-mix(in oklch, var(--danger) 8%, transparent);
        }

        #connection-status.disconnected .live-dot {
            background: var(--danger);
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.4; }
            100% { transform: scale(2.4); opacity: 0; }
        }

        @keyframes status-breathe {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* === 버튼 공통 === */
        .btn {
            padding: 5px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            font-size: var(--text-xs);
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font-sans);
            transition: all var(--dur-fast) var(--ease-out-expo);
        }

        .btn:hover {
            background: oklch(var(--overlay-base) / 0.06);
            transform: translateY(-0.5px);
        }

        .btn:active {
            transform: scale(0.97);
        }

        #btn-pause {
            color: var(--ok);
        }

        #btn-pause.paused {
            color: var(--warn);
            border-color: color-mix(in oklch, var(--warn) 40%, transparent);
        }

        #btn-shutdown {
            color: var(--danger);
            border-color: color-mix(in oklch, var(--danger) 30%, transparent);
        }

        #auto-scroll {
            color: var(--text-tertiary);
            font-size: var(--text-xs);
        }

        .meta {
            color: var(--text-secondary);
            font-size: var(--text-xs);
        }

        /* === 프로그레스 바 === */
        #postprocess-bar {
            height: 3px;
            background: var(--border-subtle);
            border-radius: 2px;
            overflow: hidden;
            display: none;
            position: relative;
        }

        #postprocess-bar .fill {
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, var(--accent), var(--ok));
            transition: width var(--dur-slow) var(--ease-out-expo);
            width: 0%;
            position: relative;
        }

        #postprocess-bar .fill::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, oklch(var(--overlay-base) / 0.12), transparent);
            animation: shimmer 2s ease-in-out infinite;
        }

        @keyframes shimmer {
            from { transform: translateX(-100%); }
            to { transform: translateX(100%); }
        }

        /* === 키워드 섹션 === */
        #keyword-section {
            margin-bottom: 4px;
        }

        #keyword-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            padding: 8px 14px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-secondary);
            font-size: var(--text-sm);
            cursor: pointer;
            transition: all var(--dur-fast) var(--ease-out-expo);
        }

        #keyword-toggle:hover {
            background: oklch(var(--overlay-base) / 0.04);
            border-color: color-mix(in oklch, var(--accent) 30%, transparent);
        }

        .toggle-arrow {
            font-size: 10px;
            transition: transform var(--dur-fast) var(--ease-out-expo);
        }

        .toggle-arrow.open {
            transform: rotate(90deg);
        }

        .keyword-count-badge {
            margin-left: auto;
            font-size: var(--text-xs);
            color: var(--accent);
            opacity: 0.8;
        }

        #keyword-body {
            padding-top: 8px;
        }

        #keyword-bar {
            display: flex;
            gap: 8px;
        }

        #keyword-input {
            flex: 1;
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid var(--border-subtle);
            background: var(--input-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: var(--text-primary);
            font-size: var(--text-sm);
            font-family: var(--font-sans);
            outline: none;
            transition: border-color var(--dur-fast) var(--ease-out-expo);
        }

        #keyword-input:focus {
            border-color: color-mix(in oklch, var(--accent) 50%, transparent);
        }

        #keyword-input::placeholder {
            color: var(--text-tertiary);
        }

        #btn-keyword-add {
            color: var(--accent);
            border-color: color-mix(in oklch, var(--accent) 30%, transparent);
        }

        @media (max-width: 900px) {
            .status-group-device {
                width: 100%;
                justify-content: space-between;
            }

            #device-select {
                min-width: 0;
                width: min(100%, 280px);
            }
        }

        #keyword-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 0;
        }

        .keyword-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 999px;
            font-size: var(--text-xs);
            font-weight: 500;
            background: oklch(var(--overlay-base) / 0.05);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            line-height: 1;
            transition: all var(--dur-fast) var(--ease-out-expo);
            animation: chip-in 0.25s var(--ease-out-expo) both;
        }

        .keyword-chip:hover {
            background: oklch(var(--overlay-base) / 0.09);
            border-color: var(--border);
            transform: scale(1.03);
        }

        .keyword-chip.manual {
            border-color: color-mix(in oklch, var(--accent) 35%, transparent);
        }

        .keyword-chip.promoted {
            border-color: color-mix(in oklch, var(--ok) 35%, transparent);
        }

        .keyword-chip.extracted {
            color: var(--text-secondary);
            border-style: dashed;
        }

        .keyword-chip.blocked {
            color: var(--text-tertiary);
            opacity: 0.65;
        }

        .keyword-tag {
            padding: 2px 6px;
            border-radius: 999px;
            font-size: 0.66rem;
            font-family: var(--font-mono);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            background: oklch(var(--overlay-base) / 0.08);
            color: var(--text-tertiary);
        }

        @keyframes chip-in {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .keyword-remove {
            border: none;
            background: transparent;
            color: var(--text-tertiary);
            cursor: pointer;
            font-size: var(--text-sm);
            padding: 0;
            line-height: 1;
            transition: color var(--dur-fast);
        }

        .keyword-remove:hover {
            color: var(--danger);
        }

        .keyword-empty {
            color: var(--text-tertiary);
            font-size: var(--text-xs);
        }

        /* === 전사 영역 === */
        #transcript {
            flex: 1;
            min-height: min(65vh, 500px);
            max-height: min(75vh, 800px);
            overflow-y: auto;
            border-radius: 16px;
            padding: 16px;
            scroll-behavior: smooth;
            background: var(--transcript-bg);
            backdrop-filter: blur(16px) saturate(130%);
            -webkit-backdrop-filter: blur(16px) saturate(130%);
            border: 1px solid var(--border-subtle);
        }

        /* 윈도우 터미널 스타일 가변 스크롤바 */
        #transcript::-webkit-scrollbar {
            width: 14px;
        }
        #transcript::-webkit-scrollbar-thumb {
            background-color: oklch(var(--overlay-base) / 0.1);
            border: 5px solid transparent;
            border-radius: 14px;
            background-clip: padding-box;
            transition: background-color var(--dur-fast);
            min-height: 40px; /* 콘텐츠가 길어져도 최소 40px 유지 */
        }
        #transcript:hover::-webkit-scrollbar-thumb {
            background-color: oklch(var(--overlay-base) / 0.25);
            border: 3px solid transparent;
        }
        #transcript::-webkit-scrollbar-thumb:hover {
            background-color: oklch(var(--overlay-base) / 0.4);
        }

        /* === 전사 라인 === */
        #transcript p {
            margin: 0;
            padding: 10px 0;
            border-bottom: 1px solid oklch(var(--overlay-base) / 0.04);
            display: grid;
            grid-template-columns: auto auto 1fr;
            align-items: start;
            column-gap: 12px;
            line-height: 1.55;
            word-break: keep-all;
            animation: line-appear 0.4s var(--ease-out-expo) both;
            transition: opacity var(--dur-normal) ease, filter var(--dur-normal) ease;
            
            /* 기본적으로 이전 대화는 약간 흐리게 */
            opacity: var(--history-opacity);
            filter: grayscale(0.2);
        }

        /* PiP 전용 스타일 (클래스 기반) */
        .pip-mode p {
            padding: 8px 0 !important;
            grid-template-columns: 4px 1fr !important; /* 화자 라벨 대신 얇은 바 */
            column-gap: 8px !important;
        }

        .pip-mode .timestamp {
            display: none !important; /* PiP에선 시간 숨김 */
        }

        .pip-mode .speaker-label {
            width: 4px !important;
            min-width: 4px !important;
            height: 100% !important;
            padding: 0 !important;
            border: none !important;
            border-radius: 2px !important;
            font-size: 0 !important; /* 텍스트 숨김 */
            background: currentColor !important;
            align-self: stretch !important;
        }

        .pip-mode .text {
            font-size: 0.95rem !important;
            line-height: 1.4 !important;
        }

        /* 최근 3개 문장까지 단계별 강조 (가장 최근이 가장 밝음) */
        #transcript p:last-child {
            opacity: 1;
            filter: grayscale(0);
        }

        #transcript p:nth-last-child(2) {
            opacity: 0.8;
            filter: grayscale(0);
        }

        #transcript p:nth-last-child(3) {
            opacity: 0.6;
        }

        #transcript p:last-child .text {
            color: var(--text-primary);
            font-weight: 500;
            text-shadow: 0 0 15px oklch(var(--overlay-base) / 0.1);
        }

        #transcript p:last-child .speaker-label {
            background: color-mix(in oklch, currentColor 18%, transparent);
            border-color: color-mix(in oklch, currentColor 25%, transparent);
        }

        #transcript p:last-child .timestamp {
            opacity: 1;
        }

        #transcript p:last-child {
            border-bottom: none;
        }

        @keyframes line-appear {
            from {
                opacity: 0;
                transform: translateY(6px);
                filter: blur(1.5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        .timestamp {
            color: var(--text-tertiary);
            font-size: var(--text-xs);
            font-family: var(--font-mono);
            letter-spacing: 0.01em;
            min-width: 60px;
            opacity: 0.8;
        }

        .speaker-label {
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: var(--text-xs);
            min-width: 28px;
            padding: 2px 8px;
            border-radius: 6px;
            background: color-mix(in oklch, currentColor 12%, transparent);
            border: 1px solid color-mix(in oklch, currentColor 18%, transparent);
        }

        .speaker-a { color: var(--speaker-a); }
        .speaker-b { color: var(--speaker-b); }
        .speaker-c { color: var(--speaker-c); }
        .speaker-d { color: var(--speaker-d); }
        .speaker-e { color: var(--speaker-e); }
        .speaker-f { color: var(--speaker-f); }
        .speaker-default { color: var(--text-secondary); }

        .text {
            color: var(--text-primary);
            line-height: 1.55;
        }

        /* === 빈 상태 === */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 60px 20px;
            color: var(--text-tertiary);
            font-size: var(--text-sm);
            text-align: center;
        }

        .empty-state .icon {
            font-size: 2rem;
            opacity: 0.4;
        }

        /* === 검색 하이라이트 === */
        #transcript mark {
            background: oklch(0.85 0.15 85 / 0.45);
            border-radius: 2px;
            padding: 1px 2px;
            color: var(--text-primary);
            scroll-margin-top: 60px;
            scroll-margin-bottom: 60px;
        }

        /* 현재 포커스된 검색 결과 */
        #transcript mark.search-current {
            background: oklch(0.70 0.18 55 / 0.7);
            outline: 2px solid oklch(0.70 0.18 55);
            outline-offset: 1px;
            color: oklch(0.15 0 0);
        }

        /* 라이트 모드 검색 하이라이트 (WCAG AA 4.5:1 대비) */
        :root[data-theme="light"] #transcript mark {
            background: oklch(0.88 0.14 85 / 0.55);
            color: oklch(0.20 0.01 270);
        }
        :root[data-theme="light"] #transcript mark.search-current {
            background: oklch(0.72 0.16 55 / 0.75);
            outline-color: oklch(0.60 0.16 55);
            color: oklch(0.15 0 0);
        }

        /* === 검색 네비게이션 바 === */
        .search-nav-bar {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            font-size: var(--text-xs);
            color: var(--text-secondary);
            background: oklch(var(--overlay-base) / 0.03);
            border-radius: 8px;
            border: 1px solid var(--border-subtle);
        }

        .search-nav-bar.visible {
            display: flex;
        }

        .search-nav-counter {
            font-family: var(--font-mono);
            min-width: 50px;
            text-align: center;
            color: var(--text-tertiary);
        }

        .search-nav-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border-radius: 6px;
            border: 1px solid var(--border-subtle);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 12px;
            padding: 0;
            transition: all var(--dur-fast);
        }

        .search-nav-btn:hover {
            background: oklch(var(--overlay-base) / 0.06);
            color: var(--text-primary);
        }

        .search-nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .search-nav-close {
            margin-left: auto;
        }

        /* === 가상 스크롤 컨테이너 === */
        .virtual-scroll-container {
            position: relative;
            overflow-y: auto;
            will-change: transform;
        }

        .virtual-scroll-spacer {
            width: 100%;
            pointer-events: none;
        }

        .virtual-scroll-viewport {
            position: relative;
            width: 100%;
        }

        /* === 화자 등록 패널 === */
        #enroll-toggle {
            color: var(--text-secondary);
            border-color: var(--border-subtle);
            font-size: var(--text-xs);
            position: relative;
        }

        #enroll-toggle.has-speakers::after {
            content: attr(data-count);
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--accent);
            color: white;
            font-size: 0.65rem;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        #enroll-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height var(--dur-slow) var(--ease-out-expo),
                        opacity var(--dur-normal) var(--ease-out-expo);
            opacity: 0;
        }

        #enroll-panel.open {
            max-height: 360px;
            opacity: 1;
        }

        .enroll-content {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .enroll-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        #enroll-name {
            flex: 1;
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid var(--border-subtle);
            background: var(--input-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: var(--text-primary);
            font-size: var(--text-sm);
            font-family: var(--font-sans);
            outline: none;
            transition: border-color var(--dur-fast);
        }

        #enroll-name:focus {
            border-color: color-mix(in oklch, var(--accent) 50%, transparent);
        }

        #btn-record {
            min-width: 80px;
            transition: all var(--dur-fast) var(--ease-out-expo);
        }

        #btn-record.recording {
            color: var(--danger);
            border-color: color-mix(in oklch, var(--danger) 50%, transparent);
            animation: status-breathe 1s ease-in-out infinite;
        }

        .enroll-status {
            font-size: var(--text-xs);
            min-height: 1.4em;
            transition: color var(--dur-fast);
        }

        .enroll-status.error { color: var(--danger); }
        .enroll-status.success { color: var(--ok); }
        .enroll-status.info { color: var(--text-secondary); }

        .speaker-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .speaker-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: var(--text-xs);
            font-weight: 500;
            background: color-mix(in oklch, var(--ok) 10%, transparent);
            color: var(--ok);
            border: 1px solid color-mix(in oklch, var(--ok) 20%, transparent);
            animation: chip-in 0.25s var(--ease-out-expo) both;
        }

        .record-timer {
            font-family: var(--font-mono);
            font-size: var(--text-sm);
            color: var(--danger);
            min-width: 30px;
            text-align: center;
        }

        .enroll-unavailable {
            color: var(--text-tertiary);
            font-size: var(--text-xs);
            text-align: center;
            padding: 8px;
        }

        /* === 반응형: 사이드바 === */
        @media (max-width: 768px) {
            .sidebar-toggle {
                display: flex;
            }

            .sidebar-close {
                display: flex;
            }

            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                z-index: 200;
                box-shadow: 8px 0 32px oklch(0 0 0 / 0.3);
            }

            .sidebar.collapsed {
                transform: translateX(-100%);
                width: 272px;
                opacity: 1;
                pointer-events: auto;
                box-shadow: none;
            }

            /* 모바일 사이드바 열렸을 때 배경 오버레이 */
            .sidebar-backdrop {
                display: none;
                position: fixed;
                inset: 0;
                background: oklch(0 0 0 / 0.35);
                backdrop-filter: blur(4px);
                -webkit-backdrop-filter: blur(4px);
                z-index: 199;
                opacity: 0;
                transition: opacity var(--dur-normal) var(--ease-out-expo);
            }

            .sidebar-backdrop.visible {
                display: block;
                opacity: 1;
            }
        }

        /* === 반응형: 640px 이하 === */
        @media (max-width: 640px) {
            .page {
                padding: 16px 12px 14px;
                gap: 12px;
            }

            h1 { font-size: var(--text-lg); }

            #status-bar {
                padding: 8px 12px;
                gap: 8px;
            }

            #transcript {
                padding: 12px;
                border-radius: 12px;
            }

            #transcript p {
                grid-template-columns: auto 1fr;
                grid-template-areas:
                    "speaker text"
                    "time text";
                row-gap: 2px;
                column-gap: 8px;
            }

            .timestamp {
                grid-area: time;
                min-width: auto;
            }

            .speaker-label { grid-area: speaker; }
            .text { grid-area: text; }
        }

        /* === 반응형: 360px 이하 (극소 화면) === */
        @media (max-width: 360px) {
            .page {
                padding: 10px 6px 10px;
                gap: 8px;
            }

            h1 { font-size: var(--text-base); }

            #status-bar {
                padding: 6px 8px;
                gap: 6px;
                flex-direction: column;
                align-items: stretch;
            }

            .status-group-device {
                min-width: 0;
            }

            #device-select {
                min-width: 0;
                width: 100%;
            }

            .history-banner {
                flex-direction: column;
                gap: 8px;
                text-align: center;
            }

            #transcript {
                padding: 8px;
                border-radius: 10px;
                min-height: min(50vh, 300px);
            }

            #transcript p {
                grid-template-columns: 1fr;
                grid-template-areas:
                    "speaker"
                    "text"
                    "time";
                column-gap: 0;
                row-gap: 2px;
            }

            .timestamp { grid-area: time; font-size: 0.6rem; }
            .speaker-label { grid-area: speaker; }
            .text { grid-area: text; }

            .sidebar { width: 240px; min-width: 180px; }
            .sidebar.collapsed { width: 240px; }
        }

        /* === 모션 접근성 === */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            #transcript {
                scroll-behavior: auto;
            }
        }

        /* === 커스텀 모달 === */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: oklch(0 0 0 / 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--dur-normal) var(--ease-out-expo);
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-container {
            width: min(90%, 340px);
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 20px 40px oklch(0 0 0 / 0.3);
            transform: scale(0.9);
            transition: transform var(--dur-normal) var(--ease-out-expo);
        }

        .modal-overlay.open .modal-container {
            transform: scale(1);
        }

        .modal-title {
            font-size: var(--text-lg);
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .modal-desc {
            font-size: var(--text-sm);
            color: var(--text-secondary);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
        }

        .modal-btn {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--dur-fast);
            border: none;
        }

        .modal-btn-cancel {
            background: var(--surface-3);
            color: var(--text-primary);
        }

        .modal-btn-confirm {
            background: var(--danger);
            color: white;
        }

        .modal-btn:hover {
            filter: brightness(1.1);
        }

        /* === 오디오 액티비티 링 === */
        .audio-ring {
            display: inline-flex;
            gap: 2px;
            height: 10px;
            align-items: center;
            margin-left: 6px;
        }

        .audio-bar {
            width: 2px;
            height: 4px;
            background: currentColor;
            border-radius: 1px;
            animation: audio-pulse 1s ease-in-out infinite;
        }

        .audio-bar:nth-child(2) { animation-delay: 0.2s; height: 8px; }
        .audio-bar:nth-child(3) { animation-delay: 0.4s; height: 6px; }

        @keyframes audio-pulse {
            0%, 100% { transform: scaleY(1); opacity: 0.5; }
            50% { transform: scaleY(1.8); opacity: 1; }
        }

        /* === 교정 하이라이트 애니메이션 === */
        .transcript p.corrected {
            background: color-mix(in oklch, var(--accent) 15%, transparent);
            transition: background 0.3s ease-in;
        }
        .transcript p.corrected .text {
            color: var(--accent);
            transition: color 2s ease-out;
        }
        /* 페이드아웃 (클래스 제거 시) */
        .transcript p {
            transition: background 1.5s ease-out;
        }
        .transcript p .text {
            transition: color 1.5s ease-out;
        }
    </style>
</head>
<body>
    <!-- 모바일 사이드바 백드롭 -->

                    <button class="btn" id="theme-toggle-btn" onclick="toggleTheme()" title="다크/라이트 모드 전환" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; color: var(--text-secondary);">

        <!-- === 메인 콘텐츠 === -->
        <div class="main-content">
    <main class="page">

            <button class="search-nav-btn" id="search-nav-prev" onclick="navigateSearch(-1)" title="이전 결과 (Shift+Enter)" aria-label="이전 검색 결과">

            <div id="status-bar" class="glass">

    <!-- 커스텀 종료 확인 모달 -->

        <div class="modal-container" tabindex="-1">
            <h2 class="modal-title" id="delete-modal-title">세션을 삭제할까요?</h2>
            <div class="modal-desc" id="delete-modal-desc">이 세션의 모든 전사 기록이 영구적으로 삭제됩니다.</div>
